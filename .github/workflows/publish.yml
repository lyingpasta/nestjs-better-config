name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Verify tarball contains the package entry
        run: |
          npm pack --dry-run --json | node -e "
            const files = JSON.parse(require('fs').readFileSync(0))[0].files.map(f => f.path);
            if (!files.includes('dist/index.js')) {
              console.error('dist/index.js missing from tarball — refusing to publish. Files:', files);
              process.exit(1);
            }
          "
      - name: Verify tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PKG_VERSION" >&2
            exit 1
          fi
      - run: npm publish --access public # auth + provenance via OIDC trusted publisher
